name: Trading Bot

on:
  schedule:
    - cron: '*/30 13-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run trading bot
        run: python bot.py

      - name: Commit updated state and dashboard data
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state/ dashboard/public/dashboard_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Bot run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
